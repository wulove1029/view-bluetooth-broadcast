name: Auto Version Bump & Release

on:
  push:
    branches:
      - master
    paths:
      - 'view_bluetooth_broadcast.py'
      - 'VERSION'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── 第一步：在 Linux 上遞增版本號並建立 tag ─────────────────
  bump-version:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    outputs:
      new_version: ${{ steps.bump.outputs.new }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        id: bump
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "$NEW_VERSION" > VERSION
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit & push version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new }} [skip ci]"
          git tag "v${{ steps.bump.outputs.new }}"
          git push origin master --tags

  # ── 第二步：在 Windows 上打包 .exe ──────────────────────────
  build-exe:
    runs-on: windows-latest
    needs: bump-version

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller bleak PyQt6

      - name: Build exe with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "BLE廣播掃描工具" view_bluetooth_broadcast.py

      - name: Copy VERSION into dist
        run: copy VERSION dist\VERSION

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe-artifact
          path: dist/BLE廣播掃描工具.exe

  # ── 第三步：建立 Release 並附上 .exe ────────────────────────
  create-release:
    runs-on: ubuntu-latest
    needs: [bump-version, build-exe]

    steps:
      - name: Download exe artifact
        uses: actions/download-artifact@v4
        with:
          name: exe-artifact

      - name: Create GitHub Release with exe
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.bump-version.outputs.new_version }}
          name: Release v${{ needs.bump-version.outputs.new_version }}
          body: |
            ## 自動發布 v${{ needs.bump-version.outputs.new_version }}

            由 GitHub Actions 自動產生。

            ### 下載
            - **BLE廣播掃描工具.exe** — Windows 免安裝執行檔（需要藍芽適配器）

            ### 需求
            - Windows 10 / 11（64-bit）
            - 藍芽 4.0+ 適配器
          files: BLE廣播掃描工具.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
