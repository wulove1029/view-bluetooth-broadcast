name: Auto Version Bump & Release

on:
  push:
    branches:
      - master
    paths:
      - 'view_bluetooth_broadcast.py'
      - 'VERSION'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── 第一步：在 Linux 上遞增版本號並建立 tag ─────────────────
  bump-version:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    outputs:
      new_version: ${{ steps.bump.outputs.new }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        id: bump
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "$NEW_VERSION" > VERSION
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit & push version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new }} [skip ci]"
          git tag "v${{ steps.bump.outputs.new }}"
          git push origin master --tags

  # ── 第二步：在 Windows 上打包 .exe ──────────────────────────
  build-exe:
    runs-on: windows-latest
    needs: bump-version

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller -r requirements.txt

      - name: Build with PyInstaller (onedir)
        run: |
          pyinstaller --onedir --windowed --name "BLE-Scanner" --add-data "VERSION;." --collect-data certifi view_bluetooth_broadcast.py

      - name: Zip dist folder
        run: |
          Compress-Archive -Path dist\BLE-Scanner\* -DestinationPath dist\BLE-Scanner.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe-artifact
          path: dist/BLE-Scanner.zip

  # ── 第三步：建立 Release 並附上 zip ─────────────────────────
  create-release:
    runs-on: ubuntu-latest
    needs: [bump-version, build-exe]

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: exe-artifact

      - name: Create GitHub Release with zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.bump-version.outputs.new_version }}
          name: Release v${{ needs.bump-version.outputs.new_version }}
          body: |
            ## 自動發布 v${{ needs.bump-version.outputs.new_version }}

            由 GitHub Actions 自動產生。

            ### 下載
            - **BLE-Scanner.zip** — 解壓後執行 `BLE-Scanner.exe`（需要藍芽適配器）

            > ⚠️ 改用資料夾模式打包（onedir），解決防毒軟體誤刪暫存 DLL 的問題。

            ### 需求
            - Windows 10 / 11（64-bit）
            - 藍芽 4.0+ 適配器
          files: BLE-Scanner.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
