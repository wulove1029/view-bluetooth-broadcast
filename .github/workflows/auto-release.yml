name: Auto Version Bump & Release

on:
  push:
    branches:
      - master
    paths:
      - 'view_bluetooth_broadcast.py'
      - 'VERSION'

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    # 跳過自動 commit 本身觸發的執行
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read current version
        id: read_version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "current=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Bump patch version
        id: bump
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "$NEW_VERSION" > VERSION
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped to: $NEW_VERSION"

      - name: Update version in Python source
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new }}"
          # 若 .py 中有 __version__ 行則更新，否則跳過
          if grep -q '__version__' view_bluetooth_broadcast.py; then
            sed -i "s/__version__ = \".*\"/__version__ = \"$NEW_VERSION\"/" view_bluetooth_broadcast.py
          fi

      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION view_bluetooth_broadcast.py
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new }} [skip ci]"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new }}
          name: Release v${{ steps.bump.outputs.new }}
          body: |
            ## 自動發布 v${{ steps.bump.outputs.new }}

            由 GitHub Actions 自動產生。

            ### 變更
            ${{ github.event.head_commit.message }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
